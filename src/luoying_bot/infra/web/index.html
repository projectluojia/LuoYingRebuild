<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luoying Web</title>
  <style>
    :root {
      --bg: #f5efe3;
      --panel: #fffaf0;
      --panel-strong: #f2e5c9;
      --ink: #2f2418;
      --muted: #7b6a54;
      --line: #d8c6a6;
      --accent: #876445;
      --accent-strong: #6a4b2f;
      --user: #efe2cb;
      --assistant: #fffdf7;
      --danger: #b04a3a;
      --shadow: 0 16px 40px rgba(82, 58, 32, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Han Serif SC", serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 30%),
        linear-gradient(135deg, #f7f0e6 0%, #efe2cb 48%, #ead7b3 100%);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      padding: 24px 18px;
      border-right: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.88);
      backdrop-filter: blur(10px);
    }

    .brand {
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #fffdf8, #f6ebd6);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0.04em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .section {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--accent-strong);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    .field input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(135, 100, 69, 0.12);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff9f0;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    button.secondary {
      background: #d6c2a3;
      color: var(--ink);
    }

    .session-list {
      display: grid;
      gap: 8px;
      max-height: 45vh;
      overflow: auto;
    }

    .session-item {
      border: 1px solid var(--line);
      background: #fff;
      padding: 12px;
      cursor: pointer;
    }

    .session-item.active {
      border-color: var(--accent);
      background: var(--panel-strong);
    }

    .session-title {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .session-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      padding: 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }

    .hero,
    .composer,
    .history-panel {
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.92);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 18px 20px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .hero p,
    .status-text,
    .empty-text {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .history-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chat-log {
      flex: 1;
      overflow: auto;
      display: grid;
      gap: 12px;
      padding-right: 4px;
      min-height: 280px;
    }

    .message {
      border: 1px solid var(--line);
      padding: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user { background: var(--user); }
    .message.assistant { background: var(--assistant); }

    .message .meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .composer {
      padding: 16px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      padding: 14px;
      font-size: 15px;
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      margin-bottom: 12px;
    }

    .upload-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .upload-row input[type="file"] {
      flex: 1;
      min-width: 200px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 13px;
    }

    .status-text {
      min-height: 22px;
      font-size: 13px;
    }

    .danger { color: var(--danger); }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .main {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <section class="brand">
        <h1>Luoying Web</h1>
        <p>最小可用 Web 端。可以填写身份、创建会话、发送消息，并查看当前用户的历史会话。</p>
      </section>

      <section class="section">
        <h2>身份信息</h2>
        <div class="field">
          <label for="userId">用户 ID</label>
          <input id="userId" placeholder="例如：u_001">
        </div>
        <div class="field">
          <label for="userName">显示名</label>
          <input id="userName" placeholder="例如：Alice">
        </div>
        <div class="button-row">
          <button id="saveIdentityBtn" type="button">保存身份</button>
          <button id="loadSessionsBtn" class="secondary" type="button">刷新会话</button>
        </div>
      </section>

      <section class="section">
        <h2>会话列表</h2>
        <div class="button-row" style="margin-bottom: 12px;">
          <button id="newSessionBtn" type="button">新建会话</button>
        </div>
        <div id="sessionList" class="session-list"></div>
      </section>
    </aside>

    <main class="main">
      <section class="hero">
        <h2>最小可用产品闭环</h2>
        <p>先保存身份，再新建会话。当前页面会把用户身份保存在浏览器本地，并通过后端接口管理聊天历史。</p>
      </section>

      <section class="history-panel">
        <div class="history-head">
          <div>
            <strong id="currentSessionTitle">未选择会话</strong>
            <p class="status-text" id="sessionMeta">先在左侧创建或选择一个会话。</p>
          </div>
        </div>
        <div id="chatLog" class="chat-log">
          <p class="empty-text">还没有消息。</p>
        </div>
      </section>

      <section class="composer">
        <textarea id="messageInput" placeholder="在这里输入你想对珞樱说的话"></textarea>
        <div class="upload-row">
          <input id="videoInput" type="file" accept="video/*">
          <button id="uploadVideoBtn" class="secondary" type="button">上传视频并分析</button>
        </div>
        <div class="button-row">
          <button id="sendBtn" type="button">发送消息</button>
          <button id="clearBtn" class="secondary" type="button">清空输入</button>
        </div>
        <p id="statusText" class="status-text"></p>
      </section>
    </main>
  </div>

  <script>
    const userIdInput = document.getElementById("userId");
    const userNameInput = document.getElementById("userName");
    const sessionList = document.getElementById("sessionList");
    const currentSessionTitle = document.getElementById("currentSessionTitle");
    const sessionMeta = document.getElementById("sessionMeta");
    const chatLog = document.getElementById("chatLog");
    const messageInput = document.getElementById("messageInput");
    const videoInput = document.getElementById("videoInput");
    const statusText = document.getElementById("statusText");

    let currentSessionId = null;

    function setStatus(text, isError = false) {
      statusText.textContent = text || "";
      statusText.className = isError ? "status-text danger" : "status-text";
    }

    function saveIdentity() {
      const userId = userIdInput.value.trim();
      const userName = userNameInput.value.trim();
      if (!userId || !userName) {
        setStatus("请先填写用户 ID 和显示名。", true);
        return false;
      }
      localStorage.setItem("luoying_web_user_id", userId);
      localStorage.setItem("luoying_web_user_name", userName);
      setStatus("身份信息已保存。");
      return true;
    }

    function loadIdentity() {
      userIdInput.value = localStorage.getItem("luoying_web_user_id") || "";
      userNameInput.value = localStorage.getItem("luoying_web_user_name") || "";
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      const text = await response.text();
      const contentType = response.headers.get("content-type") || "";
      let payload = {};
      if (text) {
        if (contentType.includes("application/json")) {
          payload = JSON.parse(text);
        } else {
          try {
            payload = JSON.parse(text);
          } catch {
            payload = { detail: text };
          }
        }
      }
      if (!response.ok) {
        const detail = payload.detail;
        const detailMessage = typeof detail === "string"
          ? detail
          : (detail && typeof detail === "object" ? detail.message : "");
        throw new Error(detailMessage || payload.message || `请求失败：${response.status}`);
      }
      return payload;
    }

    function renderSessions(sessions) {
      sessionList.innerHTML = "";
      if (!sessions.length) {
        sessionList.innerHTML = '<p class="empty-text">当前用户还没有会话。</p>';
        return;
      }
      sessions.forEach((session) => {
        const item = document.createElement("div");
        item.className = "session-item" + (session.session_id === currentSessionId ? " active" : "");
        item.innerHTML = `
          <div class="session-title">${escapeHtml(session.title)}</div>
          <div class="session-meta">${escapeHtml(session.updated_at || "")}</div>
        `;
        item.addEventListener("click", () => {
          currentSessionId = session.session_id;
          loadMessages(session.session_id);
          renderSessions(sessions);
        });
        sessionList.appendChild(item);
      });
    }

    function renderMessages(messages) {
      chatLog.innerHTML = "";
      if (!messages.length) {
        chatLog.innerHTML = '<p class="empty-text">当前会话还没有消息。</p>';
        return;
      }
      messages.forEach((message) => {
        const div = document.createElement("div");
        div.className = `message ${message.role === "assistant" ? "assistant" : "user"}`;
        div.innerHTML = `
          <div class="meta">
            <span>${message.role === "assistant" ? "珞樱" : "你"}</span>
            <span>${escapeHtml(message.timestamp || "")}</span>
          </div>
          <div>${escapeHtml(message.text || "")}</div>
        `;
        chatLog.appendChild(div);
      });
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function loadSessions() {
      const userId = userIdInput.value.trim();
      if (!userId) {
        renderSessions([]);
        return;
      }
      try {
        const data = await requestJson(`/api/sessions?user_id=${encodeURIComponent(userId)}`);
        renderSessions(data.sessions || []);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function createSession() {
      if (!saveIdentity()) {
        return;
      }
      try {
        const data = await requestJson("/api/sessions", {
          method: "POST",
          body: JSON.stringify({
            user_id: userIdInput.value.trim(),
            user_name: userNameInput.value.trim(),
          }),
        });
        currentSessionId = data.session.session_id;
        await loadSessions();
        await loadMessages(currentSessionId);
        setStatus("新会话已创建。");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function loadMessages(sessionId) {
      const userId = userIdInput.value.trim();
      if (!sessionId || !userId) {
        return;
      }
      try {
        const data = await requestJson(`/api/sessions/${encodeURIComponent(sessionId)}/messages?user_id=${encodeURIComponent(userId)}`);
        currentSessionTitle.textContent = data.session.title || "未命名会话";
        sessionMeta.textContent = `会话 ID：${data.session.session_id}`;
        renderMessages(data.messages || []);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function sendMessage() {
      if (!saveIdentity()) {
        return;
      }
      if (!currentSessionId) {
        setStatus("请先新建或选择一个会话。", true);
        return;
      }
      const text = messageInput.value.trim();
      if (!text) {
        setStatus("请输入消息内容。", true);
        return;
      }
      setStatus("正在等待回复...");
      try {
        await requestJson("/api/chat", {
          method: "POST",
          body: JSON.stringify({
            session_id: currentSessionId,
            user_id: userIdInput.value.trim(),
            user_name: userNameInput.value.trim(),
            text,
          }),
        });
        messageInput.value = "";
        await loadSessions();
        await loadMessages(currentSessionId);
        setStatus("消息发送成功。");
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function uploadVideo() {
      if (!saveIdentity()) {
        return;
      }
      if (!currentSessionId) {
        setStatus("请先新建或选择一个会话。", true);
        return;
      }
      const file = videoInput.files && videoInput.files[0];
      if (!file) {
        setStatus("请先选择一个视频文件。", true);
        return;
      }

      setStatus("正在上传视频并等待视觉模型分析...");
      try {
        const response = await fetch(
          `/api/sessions/${encodeURIComponent(currentSessionId)}/video/describe?user_id=${encodeURIComponent(userIdInput.value.trim())}&user_name=${encodeURIComponent(userNameInput.value.trim())}`,
          {
            method: "POST",
            headers: {
              "Content-Type": file.type || "application/octet-stream",
              "X-File-Name": encodeURIComponent(file.name || "uploaded_video"),
            },
            body: file,
          }
        );

        const payload = await response.json();
        if (!response.ok) {
          const detail = payload.detail;
          const detailMessage = typeof detail === "string"
            ? detail
            : (detail && typeof detail === "object" ? detail.message : "");
          throw new Error(detailMessage || payload.message || `请求失败：${response.status}`);
        }

        await loadSessions();
        await loadMessages(currentSessionId);
        videoInput.value = "";
        setStatus(`视频分析完成：${(payload.reply || "").slice(0, 80)}${payload.reply && payload.reply.length > 80 ? "..." : ""}`);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    document.getElementById("saveIdentityBtn").addEventListener("click", saveIdentity);
    document.getElementById("loadSessionsBtn").addEventListener("click", loadSessions);
    document.getElementById("newSessionBtn").addEventListener("click", createSession);
    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("uploadVideoBtn").addEventListener("click", uploadVideo);
    document.getElementById("clearBtn").addEventListener("click", () => { messageInput.value = ""; });
    messageInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        sendMessage();
      }
    });

    loadIdentity();
    if (userIdInput.value.trim()) {
      loadSessions();
    }
  </script>
</body>
</html>
