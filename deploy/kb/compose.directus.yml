name: luoying-kb-directus

services:
  directus-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DIRECTUS_DB_NAME:-directus}
      POSTGRES_USER: ${DIRECTUS_DB_USER:-directus}
      POSTGRES_PASSWORD: ${DIRECTUS_DB_PASSWORD}
    volumes:
      - directus_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIRECTUS_DB_USER:-directus} -d ${DIRECTUS_DB_NAME:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - kb
    restart: unless-stopped

  directus-cache:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - directus_cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - kb
    restart: unless-stopped

  directus:
    image: directus/directus:11
    ports:
      - "${DIRECTUS_HTTP_PORT:-8055}:8055"
    environment:
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: 5432
      DB_DATABASE: ${DIRECTUS_DB_NAME:-directus}
      DB_USER: ${DIRECTUS_DB_USER:-directus}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD}
      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: redis
      REDIS: redis://directus-cache:6379
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      ADMIN_TOKEN: ${DIRECTUS_ADMIN_TOKEN}
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    depends_on:
      directus-db:
        condition: service_healthy
      directus-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8055/server/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - kb
      - app_network
    restart: unless-stopped

volumes:
  directus_db:
  directus_cache:
  directus_uploads:
  directus_extensions:

networks:
  kb:
    driver: bridge
  app_network:
    external: true
    name: luoying_app_network
